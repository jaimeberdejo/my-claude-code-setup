name: CI

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  scaffold-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq + shellcheck
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Shell syntax — scaffold scripts, hooks, and shared libs
        working-directory: lean-stack
        run: |
          set -e
          for f in scripts/*.sh .claude/hooks/*.sh .claude/lib/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Shell syntax — installer & smoke test
        run: |
          set -e
          bash -n install.sh
          bash -n .github/scripts/install-smoke.sh

      - name: shellcheck — installer, scaffold scripts, hooks, libs
        run: |
          shellcheck -S warning -e SC1090,SC1091 \
            install.sh .github/scripts/*.sh \
            lean-stack/scripts/*.sh \
            lean-stack/.claude/hooks/*.sh \
            lean-stack/.claude/lib/*.sh

      - name: actionlint — both workflow files
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color .github/workflows/ci.yml lean-stack/.github/workflows/lean-stack-ci.yml

      - name: settings.json is valid JSON
        working-directory: lean-stack
        run: jq empty .claude/settings.json

      - name: Behavioral guard tests (high-stakes, secret-scan, autopilot gates, checkpoint, hooks)
        working-directory: lean-stack
        run: |
          set -e
          git config --global user.email ci@example.com
          git config --global user.name ci
          bash scripts/test-high-stakes.sh
          bash scripts/test-secret-scan.sh
          bash scripts/test-autopilot-gates.sh
          bash scripts/test-tick.sh
          bash scripts/test-checkpoint.sh

      - name: Install smoke test (clean target, idempotency, ship-by-directory)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name ci
          bash .github/scripts/install-smoke.sh
