name: CI

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  scaffold-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert non-root Linux (the toolkit claims non-root compatibility — prove CI exercises it)
        run: |
          # jaimitos-os documents a non-root operating mode; GitHub's ubuntu runner is the non-root
          # `runner` user, so the guard + install suites below genuinely exercise that path. Assert it
          # explicitly so a future containerised/root runner can't silently retire the coverage.
          if [ "$(id -u)" -eq 0 ]; then
            echo "::error::CI is running as root (uid 0) — the non-root guard/install path is NOT being exercised."
            exit 1
          fi
          echo "running as uid $(id -u) ($(id -un)) — non-root Linux path exercised"

      - name: Install jq + shellcheck
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Shell syntax — scaffold scripts, hooks, and shared libs
        working-directory: jaimitos-os
        run: |
          set -e
          for f in scripts/*.sh .claude/hooks/*.sh .claude/lib/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Shell syntax — installer & smoke test
        run: |
          set -e
          bash -n install.sh
          bash -n .github/scripts/install-smoke.sh

      - name: shellcheck — installer, scaffold scripts, hooks, libs, sandbox
        run: |
          # Flags mirror the repo-root .shellcheckrc (kept explicit here too so the gate is legible).
          # sandbox/*.sh added in v2.6.0 — the sandbox wrapper was shell code CI wasn't linting.
          shellcheck -S warning -e SC1090,SC1091 \
            install.sh .github/scripts/*.sh \
            jaimitos-os/scripts/*.sh \
            jaimitos-os/.claude/hooks/*.sh \
            jaimitos-os/.claude/lib/*.sh \
            jaimitos-os/sandbox/*.sh

      - name: shfmt -d (advisory — the tree isn't shfmt-formatted yet, so this never fails the build)
        continue-on-error: true
        run: |
          # GitHub runners ship Go; install shfmt from source, pinned. Advisory only: continue-on-error
          # AND `|| true` both guard it, so shfmt differences (or an install hiccup) never break CI.
          # Flip this to a blocking gate once the tree is actually shfmt-formatted.
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.8.0 || true
          # Declare + assign separately (SC2155): keep `go env`'s exit status out of the export.
          GOPATH_BIN="$(go env GOPATH)/bin"
          export PATH="$PATH:$GOPATH_BIN"
          if command -v shfmt >/dev/null 2>&1; then
            shfmt -d install.sh .github/scripts/*.sh jaimitos-os/scripts/*.sh \
                     jaimitos-os/.claude/hooks/*.sh jaimitos-os/.claude/lib/*.sh jaimitos-os/sandbox/*.sh || true
          else
            echo "shfmt unavailable in this runner — advisory step skipped."
          fi

      - name: actionlint — both workflow files
        run: |
          # H7: pin to a tagged release instead of an unpinned `main` curl|bash (supply-chain hole).
          # download-actionlint.bash verifies the downloaded actionlint binary's OWN checksum against
          # the release's published sums; pinning the SCRIPT itself to a version tag stops `main`
          # changing under us. Bump ACTIONLINT_VERSION deliberately (and re-review) — don't track latest.
          ACTIONLINT_VERSION=1.7.7
          bash <(curl -fsSL "https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash") "$ACTIONLINT_VERSION"
          ./actionlint -color .github/workflows/ci.yml jaimitos-os/.github/workflows/jaimitos-os-ci.yml

      - name: settings.json is valid JSON
        working-directory: jaimitos-os
        run: jq empty .claude/settings.json

      - name: Behavioral guard tests (single shared list — scripts/run-guard-tests.sh)
        working-directory: jaimitos-os
        run: bash scripts/run-guard-tests.sh

      - name: Install smoke test (clean target, idempotency, ship-by-directory)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name ci
          bash .github/scripts/install-smoke.sh

  # Regression insurance for the bash 3.2 / BSD-userland target (macOS ships bash 3.2). The scaffold
  # has deliberate BSD/GNU-portability history; this leg catches future drift. jq is preinstalled on
  # the GitHub macOS runner; a claude-less PATH is fine (the guards stub or `command -v` it).
  macos-checks:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash version (ASSERT 3.2 — the leg is worthless if a newer Homebrew bash shadows it)
        run: |
          bash --version | head -1
          bash --version | head -1 | grep -q 'version 3\.2' \
            || { echo "::error::macOS leg expected bash 3.2 but got the above — bash-3.2 portability coverage is NOT running (a newer bash is on PATH)"; exit 1; }
      - name: Shell syntax — every .sh
        run: |
          set -e
          find . -path ./.git -prune -o -name '*.sh' -print | while IFS= read -r f; do bash -n "$f"; done
      - name: Behavioral guard tests (full suite)
        working-directory: jaimitos-os
        run: bash scripts/run-guard-tests.sh
